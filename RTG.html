                                                {me.bingoBoard?.map((item, index) => {
                                                    const isMarked = (me.bingoMarks || []).includes(index);
                                                    const isFree = index === 12;
                                                    return (
                                                        <button key={index} onClick={() => handleToggleBingo(index)} className={`relative aspect-square rounded sm:rounded-md p-1 flex items-center justify-center text-center transition-all duration-200 border-2 shadow-sm overflow-hidden ${isMarked ? `${me.color} border-white/50 text-white scale-[0.96]` : 'bg-slate-700 border-slate-600 hover:border-cyan-400 text-slate-300'} ${isFree ? 'font-black' : 'font-semibold'}`}>
                                                            <span className="text-[8px] sm:text-[10px] leading-tight break-words pointer-events-none">{item}</span>
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                        <button onClick={handleResetBingo} className="w-full bg-slate-800 border border-slate-600 hover:bg-slate-700 text-slate-300 font-bold py-3 rounded-xl transition-all active:scale-95 shadow-md">
                                            Start Fresh Board
                                        </button>
                                    </>
                                ) : (
                                    <div className="text-center text-slate-500 py-10">You need to join the game to get a Bingo Board!</div>
                                )}
                            </div>
                        )}

                        {activeTab === 'leaderboard' && (
                            <div className="p-4 overflow-y-auto h-full pb-20 space-y-4">
                                <div className="flex bg-slate-800 rounded-xl p-1 border border-slate-700">
                                    <button onClick={() => setLeaderboardView('plates')} className={`flex-1 py-2 text-sm font-bold rounded-lg transition-colors ${leaderboardView === 'plates' ? 'bg-slate-700 text-white' : 'text-slate-400 hover:text-slate-200'}`}>Plate Hunters</button>
                                    <button onClick={() => setLeaderboardView('rally')} className={`flex-1 py-2 text-sm font-bold rounded-lg transition-colors ${leaderboardView === 'rally' ? 'bg-cyan-900/50 text-cyan-400' : 'text-slate-400 hover:text-slate-200'}`}>High Scores</button>
                                </div>

                                {leaderboardView === 'plates' && (
                                    <div className="space-y-3">
                                        {globalLeaderboard.map((player, index) => (
                                            <div key={player.uid} className="bg-slate-800 rounded-xl p-4 flex items-center justify-between border border-slate-700 relative overflow-hidden">
                                                {player.plateWins > 0 && <div className="absolute top-0 right-0 bg-amber-500/20 px-2 py-1 rounded-bl-lg text-[10px] font-black text-amber-500">{(player.plateWins || 0)}x CHAMP</div>}
                                                <div className="flex items-center gap-4">
                                                    <div className="text-2xl w-8 text-center font-bold text-slate-500">{index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `#${index + 1}`}</div>
                                                    <div className={`w-12 h-12 rounded-full ${player.color} flex items-center justify-center text-xl font-bold text-white shadow-inner`}>{player.name.charAt(0)}</div>
                                                    <h3 className="font-bold text-lg text-white">{player.name}</h3>
                                                </div>
                                                <div className="text-right">
                                                    <div className="text-2xl font-black text-white">{player.score} <span className="text-[10px] font-normal text-slate-400">pts</span></div>
                                                    <div className="text-sm font-bold text-amber-500">{player.plateWins || 0} <span className="text-[10px] font-bold text-slate-500 uppercase tracking-wide">Wins</span></div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                {leaderboardView === 'rally' && (
                                    <div className="space-y-3">
                                        <select value={leaderboardRouteFilter} onChange={(e) => setLeaderboardRouteFilter(e.target.value)} className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-cyan-500">
                                            {Object.values(ROUTES).map(r => <option key={r.id} value={r.id}>{r.name}</option>)}
                                        </select>
                                        
                                        {runLeaderboard.length === 0 ? (
                                            <div className="text-center text-slate-500 py-6">No runs recorded for this route yet. Be the first!</div>
                                        ) : (
                                            runLeaderboard.map((run, index) => (
                                                <div key={run.id} className="bg-slate-800 rounded-xl p-4 flex items-center justify-between border border-slate-700">
                                                    <div className="flex items-center gap-4">
                                                        <div className="text-xl w-6 text-center font-bold text-slate-500">{index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `#${index + 1}`}</div>
                                                        <div>
                                                            <h3 className="font-bold text-white">{run.name}</h3>
                                                            <div className="text-xs text-slate-400">{VEHICLES[run.vehicleId]?.name || 'Unknown'}</div>
                                                        </div>
                                                    </div>
                                                    <div className="text-right">
                                                        <div className="text-lg font-black text-amber-400">{Math.floor(run.score || 0).toLocaleString()} pts</div>
                                                        <div className="text-[10px] font-mono font-bold text-cyan-400">
                                                            {formatFictionalTime(run.timeMs)}
                                                        </div>
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'activity' && (
                            <div className="p-4 overflow-y-auto h-full pb-20">
                                <h2 className="text-xl font-bold text-white mb-4">Activity Feed</h2>
                                <div className="border-l-2 border-slate-700 ml-4 space-y-6">
                                    {activityFeed.map((event) => (
                                        <div key={event.id} className="relative pl-6">
                                            <div className={`absolute -left-[9px] top-1 w-4 h-4 rounded-full ${event.playerColor} border-2 border-slate-900`}></div>
                                            <div className="bg-slate-800 rounded-lg p-3 border border-slate-700">
                                                <p className="text-sm text-slate-300">
                                                    {event.type === 'plate' ? <><span className="font-bold text-white">{event.playerName}</span> spotted <span className="font-bold text-cyan-400">{STATE_DATA[event.stateName]?.name || event.stateName}</span>!</> : <><span className="font-bold text-white">{event.playerName}</span> got <span className="font-bold text-emerald-400">BINGO</span>!</>}
                                                </p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                        
                    </main>

                    {claimingState && (
                        <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-slate-800 rounded-2xl p-6 w-full max-w-sm shadow-2xl border border-slate-700">
                                <div className="text-center mb-6">
                                    <span className="text-5xl block mb-4">👀</span>
                                    <h3 className="text-xl text-slate-300 mb-1">Did you spot</h3>
                                    <h2 className="text-3xl font-black text-white">{STATE_DATA[claimingState]?.name || claimingState}?</h2>
                                </div>
                                <div className="flex gap-3">
                                    <button onClick={() => setClaimingState(null)} className="flex-1 py-3 px-4 bg-slate-700 text-white rounded-lg font-bold">Cancel</button>
                                    <button onClick={handleClaimState} className="flex-1 py-3 px-4 bg-cyan-600 text-white rounded-lg font-bold">Claim it!</button>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {unclaimingState && (
                        <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-slate-800 rounded-2xl p-6 w-full max-w-sm shadow-2xl border border-rose-900/50">
                                <div className="text-center mb-6">
                                    <h3 className="text-xl text-slate-300 mb-1">Remove claim for</h3>
                                    <h2 className="text-3xl font-black text-white">{STATE_DATA[unclaimingState]?.name || unclaimingState}?</h2>
                                </div>
                                <div className="flex gap-3">
                                    <button onClick={() => setUnclaimingState(null)} className="flex-1 py-3 px-4 bg-slate-700 text-white rounded-lg font-bold">Cancel</button>
                                    <button onClick={handleUnclaimState} className="flex-1 py-3 px-4 bg-rose-600 text-white rounded-lg font-bold">Remove</button>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {confirmQuit && (
                        <div className="fixed inset-0 bg-slate-950/80 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-slate-800 rounded-2xl p-6 border-2 border-rose-900 shadow-2xl text-center max-w-xs w-full">
                                <div className="text-4xl mb-4">⚠️</div>
                                <h3 className="text-xl font-black text-white mb-2">Abandon Trip?</h3>
                                <p className="text-slate-400 text-sm font-bold mb-6">Are you sure you want to return home? Your progress will be lost.</p>
                                <div className="flex gap-2">
                                    <button onClick={() => setConfirmQuit(false)} className="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 rounded-xl">Cancel</button>
                                    <button onClick={executeDropOut} className="flex-1 bg-rose-700 hover:bg-rose-600 text-white font-bold py-3 rounded-xl shadow-[0_0_15px_rgba(225,29,72,0.5)]">Quit Trip</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {confirmResetPlates && (
                        <div className="fixed inset-0 bg-slate-950/80 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-slate-800 rounded-2xl p-6 border-2 border-amber-600 shadow-2xl text-center max-w-xs w-full">
                                <div className="text-4xl mb-4">⚠️</div>
                                <h3 className="text-xl font-black text-white mb-2">Reset Plates?</h3>
                                <p className="text-slate-400 text-sm font-bold mb-6">Are you sure you want to clear all found plates and start a new hunt? This cannot be undone.</p>
                                <div className="flex gap-2">
                                    <button onClick={() => setConfirmResetPlates(false)} className="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 rounded-xl">Cancel</button>
                                    <button onClick={() => { setConfirmResetPlates(false); handleResetPlates(); }} className="flex-1 bg-amber-600 hover:bg-amber-500 text-white font-bold py-3 rounded-xl shadow-[0_0_15px_rgba(245,158,11,0.5)]">Yes, Reset</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <nav className="bg-slate-900 border-t border-slate-800 pb-safe shrink-0 z-40 relative">
                        <div className="flex justify-around items-center h-16 max-w-4xl mx-auto px-2">
                            <button onClick={() => setActiveTab('plates')} className={`flex flex-col items-center justify-center w-full h-full transition-colors ${activeTab === 'plates' ? 'text-cyan-400' : 'text-slate-500 hover:text-slate-300'}`}>
                                <span className="text-xl mb-1">🗺️</span><span className="text-[10px] font-bold tracking-wide">MAP</span>
                            </button>
                            <button onClick={() => setActiveTab('bingo')} className={`flex flex-col items-center justify-center w-full h-full transition-colors ${activeTab === 'bingo' ? 'text-cyan-400' : 'text-slate-500 hover:text-slate-300'}`}>
                                <span className="text-xl mb-1">🎲</span><span className="text-[10px] font-bold tracking-wide">BINGO</span>
                            </button>
                            <button onClick={() => setActiveTab('rally')} className={`flex flex-col items-center justify-center w-full h-full transition-colors ${activeTab === 'rally' ? 'text-emerald-400 drop-shadow-[0_0_5px_rgba(52,211,153,0.8)]' : 'text-slate-500 hover:text-slate-300'}`}>
                                <span className="text-2xl mb-1">🧳</span><span className="text-[10px] font-black tracking-widest uppercase">TRIP</span>
                            </button>
                            <button onClick={() => setActiveTab('leaderboard')} className={`flex flex-col items-center justify-center w-full h-full transition-colors ${activeTab === 'leaderboard' ? 'text-cyan-400' : 'text-slate-500 hover:text-slate-300'}`}>
                                <span className="text-xl mb-1">🏆</span><span className="text-[10px] font-bold tracking-wide">RANK</span>
                            </button>
                            <button onClick={() => setActiveTab('activity')} className={`flex flex-col items-center justify-center w-full h-full transition-colors ${activeTab === 'activity' ? 'text-cyan-400' : 'text-slate-500 hover:text-slate-300'}`}>
                                <span className="text-xl mb-1">📜</span><span className="text-[10px] font-bold tracking-wide">FEED</span>
                            </button>
                        </div>
                    </nav>
                    
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App firebaseModules={window.FirebaseModules} />);
    </script>
</body>
</html>
