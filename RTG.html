                                                        {activeTrivia.opts.map((opt, idx) => (
                                                            <button key={idx} disabled={!!triviaMsg} onClick={() => handleTriviaAnswer(opt.isCorrect)} className={`rounded-xl font-bold text-xs sm:text-sm shadow-md transition-all flex items-center justify-center p-3 leading-tight ${triviaMsg ? 'opacity-50' : 'bg-blue-700 border-b-8 border-blue-950 hover:bg-blue-600 active:border-b-0 active:translate-y-2 text-white cursor-pointer'}`}>
                                                                {opt.text}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}

                                            {status === 'reaction' && (
                                                <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-11/12 max-w-md bg-gray-900/95 backdrop-blur-md rounded-2xl border-2 border-yellow-500 shadow-2xl p-6 flex flex-col items-center z-50">
                                                    <div className="text-yellow-400 font-black uppercase tracking-widest text-sm mb-4">Red Light, Green Light</div>
                                                    <div className="text-gray-300 text-xs text-center mb-6">Tap the light exactly when it turns GREEN!</div>
                                                    
                                                    <button 
                                                        onClick={() => handleReactionClick(reactionState === 'red')} 
                                                        disabled={reactionState === 'result' || reactionState === 'wait'}
                                                        className={`w-32 h-32 rounded-full border-4 shadow-[0_0_30px_rgba(0,0,0,0.5)] transition-colors duration-75 flex items-center justify-center
                                                            ${reactionState === 'wait' ? 'bg-gray-800 border-gray-600' :
                                                              reactionState === 'red' ? 'bg-red-600 border-red-400 shadow-[0_0_50px_rgba(220,38,38,0.8)] cursor-pointer' : 
                                                              reactionState === 'green' ? 'bg-green-500 border-green-300 shadow-[0_0_50px_rgba(34,197,94,0.8)] cursor-pointer' : 
                                                              'bg-gray-800 border-gray-600'}
                                                        `}
                                                    >
                                                        {reactionState === 'green' && <span className="text-2xl font-black text-white">GO!</span>}
                                                    </button>
                                                    
                                                    {triviaMsg && (
                                                        <div className={`mt-6 font-black text-lg ${triviaMsg.includes('Penalty') ? 'text-red-500' : 'text-green-500'}`}>
                                                            {triviaMsg}
                                                        </div>
                                                    )}
                                                </div>
                                            )}

                                            {status === 'memory' && (
                                                <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-11/12 max-w-md bg-gray-900/95 backdrop-blur-md rounded-2xl border-2 border-purple-500 shadow-2xl p-6 flex flex-col items-center z-50">
                                                    <div className="text-purple-400 font-black uppercase tracking-widest text-sm mb-2">Hot-Wire the Car</div>
                                                    <div className="text-gray-300 text-xs text-center mb-6">Memorize and repeat the sequence to restart the engine!</div>
                                                    
                                                    <div className="text-xl font-black text-white mb-6 bg-gray-800 px-4 py-2 rounded-lg border border-gray-700 min-h-[44px]">
                                                        {memoryMsg}
                                                    </div>
                                                    
                                                    <div className="grid grid-cols-2 gap-4 w-full max-w-[250px]">
                                                        {[0,1,2,3].map((val) => (
                                                            <button 
                                                                key={val}
                                                                disabled={memoryMsg !== "YOUR TURN!"}
                                                                onClick={() => handleMemoryClick(val)}
                                                                className={`aspect-square rounded-xl font-black text-2xl text-white shadow-lg transition-all active:scale-95 active:brightness-75
                                                                    ${val === 0 ? 'bg-red-500' : val === 1 ? 'bg-blue-500' : val === 2 ? 'bg-green-500' : 'bg-yellow-500'}
                                                                    ${memoryMsg !== "YOUR TURN!" ? 'opacity-50 cursor-not-allowed' : 'hover:ring-4 ring-white/30 cursor-pointer'}
                                                                `}
                                                            >
                                                                {val + 1}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}
                                        </React.Fragment>
                                    )}
                                </div>

                                <footer className="h-[15dvh] w-full bg-gray-900 border-t-8 border-gray-950 relative z-20 shrink-0">
                                    {status === 'finished' || !me.raceState?.startTime ? (
                                        <div className="w-full h-full flex items-center justify-center text-gray-700 font-black text-xl sm:text-2xl uppercase tracking-widest">
                                            ENGINE OFF
                                        </div>
                                    ) : status === 'driving' ? (
                                        <div className="w-full h-full flex gap-3 p-3">
                                            <div className="w-1/3 flex flex-col gap-3 h-full">
                                                <button onClick={() => { setReturnStatus('driving'); setStatus('refueling'); setRefuelTimer(10); }} disabled={isOverheated} className={`h-full pedal-brake rounded-xl border-x-4 border-b-8 border-red-950 flex flex-col items-center justify-center transition-transform cursor-pointer ${isOverheated ? 'bg-red-900 opacity-50' : 'bg-gradient-to-b from-red-700 to-red-900'}`}>
                                                    <span className="text-[9px] sm:text-[10px] font-black text-red-200 uppercase tracking-widest opacity-70 mb-1">PIT STOP</span>
                                                    <span className="font-black text-base sm:text-lg text-white">10 SEC</span>
                                                </button>
                                            </div>
                                            <div className="w-2/3 h-full">
                                                <button onClick={handleDrive} disabled={isOverheated} className={`w-full h-full pedal-gas rounded-2xl border-x-8 border-b-[12px] border-gray-950 flex flex-col items-center justify-center transition-transform overflow-hidden relative cursor-pointer ${isOverheated ? 'bg-red-900 opacity-50' : 'bg-gradient-to-b from-gray-600 to-gray-800'}`}>
                                                    <div className="absolute inset-0 opacity-20" style={{ backgroundImage: 'repeating-linear-gradient(0deg, transparent, transparent 10px, #000 10px, #000 20px)' }}></div>
                                                    <span className="relative z-10 text-[10px] sm:text-xs font-black text-gray-400 uppercase tracking-widest mb-1">{isOverheated ? 'TOO HOT!' : 'ACCELERATE'}</span>
                                                    <span className={`relative z-10 font-black text-3xl sm:text-4xl tracking-wider ${isOverheated ? 'text-red-400' : 'text-gray-200'}`}>GAS</span>
                                                </button>
                                            </div>
                                        </div>
                                    ) : (status === 'decision' || status === 'random_event' || status === 'poi') ? (
                                        <div className="w-full h-full flex flex-col items-center justify-center p-2">
                                            <div className="text-purple-400 font-black text-base sm:text-lg uppercase tracking-widest animate-pulse text-center">⚠️ EVENT AHEAD ⚠️</div>
                                            <div className="text-gray-500 font-bold text-[10px] sm:text-xs mt-1 text-center">Pedals Locked. Check Screen!</div>
                                        </div>
                                    ) : status === 'decisionResult' ? (
                                        <div className="w-full h-full flex items-center justify-center text-blue-400 font-black text-base sm:text-lg uppercase tracking-widest animate-pulse">
                                            RESOLVING...
                                        </div>
                                    ) : (status === 'trivia' || status === 'reaction' || status === 'memory') ? (
                                        <div className="w-full h-full flex flex-col items-center justify-center p-2">
                                            <div className="text-blue-400 font-black text-base sm:text-lg uppercase tracking-widest animate-pulse text-center">STATE BORDER AHEAD</div>
                                            <div className="text-gray-500 font-bold text-[10px] sm:text-xs mt-1 text-center">Complete challenge on screen</div>
                                        </div>
                                    ) : (
                                        <div className="w-full h-full flex items-center justify-center text-gray-700 font-black text-base sm:text-lg uppercase tracking-widest">
                                            PEDALS LOCKED
                                        </div>
                                    )}
                                </footer>
                            </div>
                        )}

                        {/* PLATES TAB */}
                        {activeTab === 'plates' && (
                            <div className="p-4 overflow-y-auto h-full pb-20">
                                <h2 className="text-xl font-bold text-white mb-4">License Plate Hunt</h2>
                                
                                {platesComplete && (
                                    <div className="bg-gradient-to-r from-yellow-500 to-amber-600 rounded-xl p-4 text-center shadow-[0_0_20px_rgba(245,158,11,0.5)] mb-6 text-white">
                                        <span className="text-4xl block mb-2">🏆</span>
                                        <h2 className="text-2xl font-black uppercase tracking-widest mb-1">HUNT COMPLETE!</h2>
                                        <p className="font-bold mb-4">{getPlateWinnerNames()} won this round!</p>
                                        <button onClick={() => setConfirmResetPlates(true)} disabled={isResettingPlates} className="bg-white text-yellow-600 px-6 py-3 rounded-xl font-black uppercase tracking-widest shadow-md active:scale-95 transition-all">
                                            Start New Game
                                        </button>
                                    </div>
                                )}

                                <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-3">
                                    {Object.keys(STATE_DATA).map((state) => {
                                        const isFound = plates[state];
                                        const finder = isFound ? players[isFound.foundBy] : null;
                                        const isOwner = isFound && user && isFound.foundBy === user.uid;
                                        return (
                                            <button key={state} onClick={() => { if (!me) return; if (!isFound) setClaimingState(state); else if (isOwner) setUnclaimingState(state); }} disabled={(isFound && !isOwner) || !me} className={`relative w-full aspect-[2/1] rounded-lg p-2 flex flex-col justify-center items-center text-center transition-all duration-200 border-2 shadow-sm ${isFound ? `${finder?.color || 'bg-gray-500'} ${isOwner ? 'border-white/50 hover:border-white' : 'border-transparent'} text-white opacity-90 scale-[0.98]` : 'bg-gray-800 border-gray-600 hover:border-blue-400 text-gray-300 hover:bg-gray-700 active:scale-95'} ${!me ? 'opacity-50 cursor-not-allowed' : ''}`}>
                                                <span className="font-semibold text-xs sm:text-sm leading-tight truncate w-full px-1">{state}</span>
                                                {isFound && <span className="text-[10px] mt-1 bg-black/30 px-2 py-0.5 rounded-full truncate max-w-[90%]">by {finder?.name || '?'}</span>}
                                                {isOwner && <span className="absolute top-1 right-1 text-[8px] bg-black/40 rounded-full w-4 h-4 flex items-center justify-center">✕</span>}
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {/* BINGO TAB */}
                        {activeTab === 'bingo' && (
                            <div className="p-4 overflow-y-auto h-full pb-20">
                                <h2 className="text-xl font-bold text-white mb-4">Road Trip Bingo</h2>
                                
                                {Object.values(players).some(p => checkBingo(p.bingoMarks)) && (
                                    <div className="bg-gradient-to-r from-green-500 to-emerald-400 rounded-xl p-4 text-center shadow-[0_0_15px_rgba(34,197,94,0.5)] mb-6 animate-pulse text-white font-black text-lg sm:text-xl">
                                        🎉 BINGO! {Object.values(players).filter(p => checkBingo(p.bingoMarks)).map(p => p.name).join(', ')} won! 🎉
                                    </div>
                                )}

                                {me && me.bingoBoard ? (
                                    <>
                                        <div className="bg-gray-800 p-2 sm:p-4 rounded-xl border border-gray-700 shadow-inner mb-4">
                                            <div className="grid grid-cols-5 gap-1 sm:gap-2">
                                                {me.bingoBoard?.map((item, index) => {
                                                    const isMarked = (me.bingoMarks || []).includes(index);
                                                    const isFree = index === 12;
                                                    return (
                                                        <button key={index} onClick={() => handleToggleBingo(index)} className={`relative aspect-square rounded sm:rounded-md p-1 flex items-center justify-center text-center transition-all duration-200 border-2 shadow-sm overflow-hidden ${isMarked ? `${me.color} border-white/50 text-white scale-[0.96]` : 'bg-gray-700 border-gray-600 hover:border-blue-400 text-gray-300'} ${isFree ? 'font-black' : 'font-semibold'}`}>
                                                            <span className="text-[8px] sm:text-[10px] leading-tight break-words pointer-events-none">{item}</span>
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                        <button onClick={handleResetBingo} className="w-full bg-gray-800 border border-gray-600 hover:bg-gray-700 text-gray-300 font-bold py-3 rounded-xl transition-all active:scale-95 shadow-md">
                                            Start Fresh Board
                                        </button>
                                    </>
                                ) : (
                                    <div className="text-center text-gray-500 py-10">You need to join the game to get a Bingo Board!</div>
                                )}
                            </div>
                        )}

                        {/* LEADERBOARD TAB */}
                        {activeTab === 'leaderboard' && (
                            <div className="p-4 overflow-y-auto h-full pb-20 space-y-4">
                                <div className="flex bg-gray-800 rounded-xl p-1 border border-gray-700">
                                    <button onClick={() => setLeaderboardView('plates')} className={`flex-1 py-2 text-sm font-bold rounded-lg transition-colors ${leaderboardView === 'plates' ? 'bg-gray-700 text-white' : 'text-gray-400 hover:text-gray-200'}`}>Plate Hunters</button>
                                    <button onClick={() => setLeaderboardView('rally')} className={`flex-1 py-2 text-sm font-bold rounded-lg transition-colors ${leaderboardView === 'rally' ? 'bg-cyan-900/50 text-cyan-400' : 'text-gray-400 hover:text-gray-200'}`}>Rally Times</button>
                                </div>

                                {leaderboardView === 'plates' && (
                                    <div className="space-y-3">
                                        {globalLeaderboard.map((player, index) => (
                                            <div key={player.uid} className="bg-gray-800 rounded-xl p-4 flex items-center justify-between border border-gray-700 relative overflow-hidden">
                                                {player.plateWins > 0 && <div className="absolute top-0 right-0 bg-yellow-500/20 px-2 py-1 rounded-bl-lg text-[10px] font-black text-yellow-500">{(player.plateWins || 0)}x CHAMP</div>}
                                                <div className="flex items-center gap-4">
                                                    <div className="text-2xl w-8 text-center font-bold text-gray-500">{index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `#${index + 1}`}</div>
                                                    <div className={`w-12 h-12 rounded-full ${player.color} flex items-center justify-center text-xl font-bold text-white shadow-inner`}>{player.name.charAt(0)}</div>
                                                    <h3 className="font-bold text-lg text-white">{player.name}</h3>
                                                </div>
                                                <div className="text-right">
                                                    <div className="text-2xl font-black text-white">{player.score} <span className="text-[10px] font-normal text-gray-400">pts</span></div>
                                                    <div className="text-sm font-bold text-yellow-500">{player.plateWins || 0} <span className="text-[10px] font-bold text-gray-500 uppercase tracking-wide">Wins</span></div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                {leaderboardView === 'rally' && (
                                    <div className="space-y-3">
                                        <select value={leaderboardRouteFilter} onChange={(e) => setLeaderboardRouteFilter(e.target.value)} className="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-cyan-500">
                                            {Object.values(ROUTES).map(r => <option key={r.id} value={r.id}>{r.name}</option>)}
                                        </select>
                                        
                                        {runLeaderboard.length === 0 ? (
                                            <div className="text-center text-gray-500 py-6">No runs recorded for this route yet. Be the first!</div>
                                        ) : (
                                            runLeaderboard.map((run, index) => (
                                                <div key={run.id} className="bg-gray-800 rounded-xl p-4 flex items-center justify-between border border-gray-700">
                                                    <div className="flex items-center gap-4">
                                                        <div className="text-xl w-6 text-center font-bold text-gray-500">{index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `#${index + 1}`}</div>
                                                        <div>
                                                            <h3 className="font-bold text-white">{run.name}</h3>
                                                            <div className="text-xs text-gray-400">{VEHICLES[run.vehicleId]?.name || 'Unknown'}</div>
                                                        </div>
                                                    </div>
                                                    <div className="text-right">
                                                        <div className="text-lg font-black text-green-400">⭐ {run.score || 0}</div>
                                                        <div className="text-[10px] font-mono font-bold text-cyan-400">
                                                            {formatTime(run.timeMs)}
                                                        </div>
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* ACTIVITY TAB */}
                        {activeTab === 'activity' && (
                            <div className="p-4 overflow-y-auto h-full pb-20">
                                <h2 className="text-xl font-bold text-white mb-4">Activity Feed</h2>
                                <div className="border-l-2 border-gray-700 ml-4 space-y-6">
                                    {activityFeed.map((event) => (
                                        <div key={event.id} className="relative pl-6">
                                            <div className={`absolute -left-[9px] top-1 w-4 h-4 rounded-full ${event.playerColor} border-2 border-gray-900`}></div>
                                            <div className="bg-gray-800 rounded-lg p-3 border border-gray-700">
                                                <p className="text-sm text-gray-300">
                                                    {event.type === 'plate' ? <><span className="font-bold text-white">{event.playerName}</span> spotted <span className="font-bold text-blue-400">{STATE_DATA[event.stateName]?.name || event.stateName}</span>!</> : <><span className="font-bold text-white">{event.playerName}</span> got <span className="font-bold text-green-400">BINGO</span>!</>}
                                                </p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                        
                    </main>

                    {/* MODALS */}
                    {claimingState && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-gray-800 rounded-2xl p-6 w-full max-w-sm shadow-2xl border border-gray-700">
                                <div className="text-center mb-6">
                                    <span className="text-5xl block mb-4">👀</span>
                                    <h3 className="text-xl text-gray-300 mb-1">Did you spot</h3>
                                    <h2 className="text-3xl font-black text-white">{STATE_DATA[claimingState]?.name || claimingState}?</h2>
                                </div>
                                <div className="flex gap-3">
                                    <button onClick={() => setClaimingState(null)} className="flex-1 py-3 px-4 bg-gray-700 text-white rounded-lg font-bold">Cancel</button>
                                    <button onClick={handleClaimState} className="flex-1 py-3 px-4 bg-blue-600 text-white rounded-lg font-bold">Claim it!</button>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {unclaimingState && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-gray-800 rounded-2xl p-6 w-full max-w-sm shadow-2xl border border-red-900/50">
                                <div className="text-center mb-6">
                                    <h3 className="text-xl text-gray-300 mb-1">Remove claim for</h3>
                                    <h2 className="text-3xl font-black text-white">{STATE_DATA[unclaimingState]?.name || unclaimingState}?</h2>
                                </div>
                                <div className="flex gap-3">
                                    <button onClick={() => setUnclaimingState(null)} className="flex-1 py-3 px-4 bg-gray-700 text-white rounded-lg font-bold">Cancel</button>
                                    <button onClick={handleUnclaimState} className="flex-1 py-3 px-4 bg-red-600 text-white rounded-lg font-bold">Remove</button>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {confirmQuit && (
                        <div className="fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-gray-800 rounded-2xl p-6 border-2 border-red-900 shadow-2xl text-center max-w-xs w-full">
                                <div className="text-4xl mb-4">⚠️</div>
                                <h3 className="text-xl font-black text-white mb-2">Drop Out?</h3>
                                <p className="text-gray-400 text-sm font-bold mb-6">Are you sure you want to return to the garage? Your progress will be lost.</p>
                                <div className="flex gap-2">
                                    <button onClick={() => setConfirmQuit(false)} className="flex-1 bg-gray-700 hover:bg-gray-600 text-white font-bold py-3 rounded-xl">Cancel</button>
                                    <button onClick={executeDropOut} className="flex-1 bg-red-700 hover:bg-red-600 text-white font-bold py-3 rounded-xl shadow-[0_0_15px_rgba(220,38,38,0.5)]">Quit Run</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {confirmResetPlates && (
                        <div className="fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-gray-800 rounded-2xl p-6 border-2 border-yellow-600 shadow-2xl text-center max-w-xs w-full">
                                <div className="text-4xl mb-4">⚠️</div>
                                <h3 className="text-xl font-black text-white mb-2">Reset Plates?</h3>
                                <p className="text-gray-400 text-sm font-bold mb-6">Are you sure you want to clear all found plates and start a new hunt? This cannot be undone.</p>
                                <div className="flex gap-2">
                                    <button onClick={() => setConfirmResetPlates(false)} className="flex-1 bg-gray-700 hover:bg-gray-600 text-white font-bold py-3 rounded-xl">Cancel</button>
                                    <button onClick={() => { setConfirmResetPlates(false); handleResetPlates(); }} className="flex-1 bg-yellow-600 hover:bg-yellow-500 text-white font-bold py-3 rounded-xl shadow-[0_0_15px_rgba(202,138,4,0.5)]">Yes, Reset</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* BOTTOM NAV */}
                    <nav className="bg-gray-800 border-t border-gray-700 pb-safe shrink-0 z-40 relative">
                        <div className="flex justify-around items-center h-16 max-w-4xl mx-auto px-2">
                            <button onClick={() => setActiveTab('plates')} className={`flex flex-col items-center justify-center w-full h-full transition-colors ${activeTab === 'plates' ? 'text-blue-400' : 'text-gray-500 hover:text-gray-300'}`}>
                                <span className="text-xl mb-1">🗺️</span><span className="text-[10px] font-bold tracking-wide">MAP</span>
                            </button>
                            <button onClick={() => setActiveTab('bingo')} className={`flex flex-col items-center justify-center w-full h-full transition-colors ${activeTab === 'bingo' ? 'text-blue-400' : 'text-gray-500 hover:text-gray-300'}`}>
                                <span className="text-xl mb-1">🎲</span><span className="text-[10px] font-bold tracking-wide">BINGO</span>
                            </button>
                            <button onClick={() => setActiveTab('rally')} className={`flex flex-col items-center justify-center w-full h-full transition-colors ${activeTab === 'rally' ? 'text-cyan-400 drop-shadow-[0_0_5px_rgba(6,182,212,0.8)]' : 'text-gray-500 hover:text-gray-300'}`}>
                                <span className="text-2xl mb-1">🏎️</span><span className="text-[10px] font-black tracking-widest uppercase">RALLY</span>
                            </button>
                            <button onClick={() => setActiveTab('leaderboard')} className={`flex flex-col items-center justify-center w-full h-full transition-colors ${activeTab === 'leaderboard' ? 'text-blue-400' : 'text-gray-500 hover:text-gray-300'}`}>
                                <span className="text-xl mb-1">🏆</span><span className="text-[10px] font-bold tracking-wide">RANK</span>
                            </button>
                            <button onClick={() => setActiveTab('activity')} className={`flex flex-col items-center justify-center w-full h-full transition-colors ${activeTab === 'activity' ? 'text-blue-400' : 'text-gray-500 hover:text-gray-300'}`}>
                                <span className="text-xl mb-1">📜</span><span className="text-[10px] font-bold tracking-wide">FEED</span>
                            </button>
                        </div>
                    </nav>
                    
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App firebaseModules={window.FirebaseModules} />);
    </script>
</body>
</html>
